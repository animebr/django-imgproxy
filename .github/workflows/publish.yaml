name: Publish

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  pypi:
    name: Publish release on PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Build package
        run: uv build
      - name: Publish package
        run: uv publish
